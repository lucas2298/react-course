<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="excercise.css">
        <title>Chatbot</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin-top: 0;
                margin-bottom: 0;
                margin-bottom: 1000px;
            }
            .chat-input-container {
                display: flex;
                margin-bottom: 20px;
                margin-bottom: 60px;
            }
            .chat-input {
                padding: 12px 20px;
                border-radius: 10px;
                border: 1px solid #ccc;
                font-size: 15px;
                border-width: 1px;
                flex-grow: 1;
            }
            .send-button {
                margin-left: 10px;
                background-color: rgb(25, 135, 84);
                color: white;
                border: none;
                padding: 12px 20px;
                cursor: pointer;
                border-radius: 10px;
                font-size: 15px;
                cursor: pointer;
            }
            .app-container {
                max-width: 600px;
                margin: auto;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .chat-message-user {
                display: flex;
                justify-content: flex-end;
                margin-bottom: 10px;
                align-items: end;
            }
            .chat-message-bot {
                display: flex;
                justify-content: flex-start;
                margin-bottom: 10px;
                align-items: end;
            }
            .chat-message-text {
                max-width: 70%;
                padding: 12px 20px;
                border-radius: 10px;
                background-color: rgb(240, 240, 240);
                font-size: 15px;
                margin: 0 10px;
                word-wrap: break-word;
            }
            .chat-messages-container {
                flex-grow: 1;
                margin-top: 20px;
                overflow: scroll;
                scrollbar-width: none;
            }
        </style>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="react-basics.js"></script>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function ChatInput({ chatMessages, setChatMessages }) {
                const [inputText, setInputText] = React.useState("");

                function saveInputText(event) {
                    setInputText(event.target.value);
                }

                function sendMessage() {
                    if (inputText === null || inputText.trim() === "") {
                        return;
                    }
                    const newChatMessages = [
                        ...chatMessages,
                        {
                            message: inputText,
                            sender: "user",
                            id: crypto.randomUUID(),
                        },
                    ];

                    const response = Chatbot.getResponse(inputText);
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: response,
                            sender: "bot",
                            id: crypto.randomUUID(),
                        },
                    ]);

                    setInputText("");
                }

                function handleKeyDown(event) {
                    if (event.key === "Enter") {
                        sendMessage();
                    } else if (event.key === "Escape") {
                        setInputText("");
                    }
                }

                return (
                    <div className="chat-input-container">
                        <input
                            className="chat-input"
                            placeholder="Send a message to Chatbot"
                            size="30"
                            onChange={saveInputText}
                            onKeyDown={handleKeyDown}
                            value={inputText}
                        />
                        <button onClick={sendMessage} className="send-button">
                            Send
                        </button>
                    </div>
                );
            }

            function ChatMessage(props) {
                const { message, sender } = props;

                return (
                    <div
                        className={
                            sender === "bot"
                                ? "chat-message-bot"
                                : "chat-message-user"
                        }
                    >
                        {sender === "bot" && (
                            <img
                                src="https://supersimple.dev/projects/chatbot/robot.png"
                                width="45"
                            />
                        )}
                        <div className="chat-message-text">{message}</div>
                        {sender === "user" && (
                            <img
                                src="https://supersimple.dev/projects/chatbot/user.png"
                                width="45"
                            />
                        )}
                    </div>
                );
            }

            function ChatMessages({ chatMessages }) {
                const chatMessagesRef = React.useRef(null);

                React.useEffect(() => {
                    const chatMessagesContainer = chatMessagesRef.current;
                    if (chatMessagesContainer) {
                        chatMessagesContainer.scrollTop =
                            chatMessagesContainer.scrollHeight;
                    }
                }, [chatMessages]);

                return (
                    <div
                        className="chat-messages-container"
                        ref={chatMessagesRef}
                    >
                        {chatMessages.map((message) => {
                            return (
                                <ChatMessage
                                    message={message.message}
                                    sender={message.sender}
                                    key={message.id}
                                />
                            );
                        })}
                    </div>
                );
            }

            function Excercise() {
                const [isOn, setIsOn] = React.useState(false);
                return (
                    <div>
                        <h1>Excercise</h1>
                        <p>
                            Excercise: 1
                        </p>
                        <button
                            className={isOn ? "exc-button-1-on" : "exc-button-1-off"}
                            onClick={() => setIsOn(!isOn)}
                        >
                            {isOn ? "ON" : "OFF"}
                        </button>
                    </div>
                );
            }

            function App() {
                const [chatMessages, setChatMessages] = React.useState([
                    {
                        message: "hello chatbot",
                        sender: "user",
                        id: "id1",
                    },
                    {
                        message: "nice to meet you",
                        sender: "bot",
                        id: "id2",
                    },
                    {
                        message: "today",
                        sender: "user",
                        id: "id3",
                    },
                    {
                        message: "monday",
                        sender: "bot",
                        id: "id4",
                    },
                ]);

                return (
                    <div className="app-container">
                        <ChatMessages chatMessages={chatMessages} />
                        <ChatInput
                            chatMessages={chatMessages}
                            setChatMessages={setChatMessages}
                        />
                        <Excercise />
                    </div>
                );
            }

            const container = document.querySelector(".js-container");
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
